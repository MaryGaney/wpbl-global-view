<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WPBL · Where the World Plays</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --cream: #F5F0E8;
      --dark: #0E0E0E;
      --red: #C8102E;
      --gold: #F2A900;
      --boston: #C8102E;
      --la: #003DA5;
      --ny: #1C2B4A;
      --sf: #EF8200;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--cream);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(14,14,14,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(245,240,232,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 64px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-badge {
      width: 36px; height: 36px;
      background: var(--red);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      color: white;
      letter-spacing: 0.5px;
    }

    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      color: var(--cream);
    }

    .logo-sub {
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(245,240,232,0.45);
      text-transform: uppercase;
      font-weight: 300;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .team-filter {
      display: flex;
      gap: 8px;
    }

    .team-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid rgba(245,240,232,0.2);
      background: transparent;
      color: rgba(245,240,232,0.6);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .team-btn:hover, .team-btn.active {
      color: white;
      border-color: transparent;
    }

    .team-btn[data-team="all"].active { background: rgba(245,240,232,0.15); border-color: rgba(245,240,232,0.3); }
    .team-btn[data-team="Boston"].active { background: var(--boston); }
    .team-btn[data-team="Los Angeles"].active { background: var(--la); }
    .team-btn[data-team="New York"].active { background: var(--ny); }
    .team-btn[data-team="San Francisco"].active { background: var(--sf); }

    .player-count {
      font-size: 12px;
      color: rgba(245,240,232,0.4);
      letter-spacing: 1px;
    }

    /* HERO */
    .hero {
      padding: 112px 48px 32px;
      position: relative;
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 8vw, 96px);
      line-height: 0.9;
      letter-spacing: 4px;
      color: var(--cream);
    }

    .hero-title span {
      color: var(--gold);
    }

    .hero-sub {
      margin-top: 16px;
      font-size: 14px;
      color: rgba(245,240,232,0.5);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 300;
    }

    /* MAP */
    #map-container {
      margin: 24px 32px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(245,240,232,0.08);
      position: relative;
      height: 62vh;
      min-height: 420px;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #0D1117;
    }

    /* Custom Leaflet tiles dark */
    .leaflet-tile-pane { filter: brightness(0.85) saturate(0.6) hue-rotate(180deg) invert(1); }

    /* LOCATION PINS */
    .pin-cluster {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .pin-cluster:hover { transform: scale(1.15); }

    .pin-inner {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: white;
      border: 2.5px solid rgba(255,255,255,0.3);
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      transition: all 0.2s;
    }

    .pin-inner.size-1 { width: 28px; height: 28px; font-size: 11px; }
    .pin-inner.size-2 { width: 34px; height: 34px; }
    .pin-inner.size-3 { width: 40px; height: 40px; font-size: 14px; }
    .pin-inner.size-4 { width: 48px; height: 48px; font-size: 16px; }

    /* MODAL OVERLAY */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(10,10,10,0.75);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
    }

    #modal-overlay.open { display: flex; }

    #modal {
      background: #141414;
      border: 1px solid rgba(245,240,232,0.1);
      border-radius: 20px;
      width: min(92vw, 700px);
      max-height: 88vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: modalIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.92) translateY(16px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }

    .modal-header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid rgba(245,240,232,0.08);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .modal-location {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      line-height: 1;
      color: var(--cream);
    }

    .modal-location-sub {
      font-size: 12px;
      color: rgba(245,240,232,0.4);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .modal-close {
      width: 32px; height: 32px;
      border: 1px solid rgba(245,240,232,0.15);
      border-radius: 50%;
      background: transparent;
      color: rgba(245,240,232,0.6);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .modal-close:hover { background: rgba(245,240,232,0.1); color: white; }

    .players-grid {
      padding: 20px 28px 28px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(245,240,232,0.15) transparent;
    }

    .player-card {
      background: rgba(245,240,232,0.04);
      border: 1px solid rgba(245,240,232,0.06);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: block;
    }

    .player-card:hover {
      background: rgba(245,240,232,0.08);
      border-color: rgba(245,240,232,0.18);
      transform: translateY(-2px);
    }

    .player-photo {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: rgba(245,240,232,0.05);
    }

    .player-photo-placeholder {
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: rgba(245,240,232,0.2);
    }

    .player-info {
      padding: 10px 12px 12px;
    }

    .player-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--cream);
      line-height: 1.3;
    }

    .player-meta {
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .player-team-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .player-team-name {
      font-size: 10px;
      color: rgba(245,240,232,0.4);
      letter-spacing: 0.5px;
    }

    .player-pos {
      font-size: 10px;
      color: rgba(245,240,232,0.3);
    }

    /* LEGEND */
    .map-legend {
      position: absolute;
      bottom: 24px;
      left: 24px;
      background: rgba(14,14,14,0.88);
      border: 1px solid rgba(245,240,232,0.1);
      border-radius: 12px;
      padding: 14px 18px;
      z-index: 500;
      backdrop-filter: blur(8px);
    }

    .legend-title {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(245,240,232,0.4);
      margin-bottom: 10px;
    }

    .legend-items {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 12px;
      color: rgba(245,240,232,0.7);
    }

    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
    }

    /* STATS BAR */
    .stats-bar {
      display: flex;
      gap: 40px;
      padding: 20px 48px;
      border-top: 1px solid rgba(245,240,232,0.06);
    }

    .stat-item {
      text-align: left;
    }

    .stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 2px;
      color: var(--gold);
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(245,240,232,0.35);
      margin-top: 2px;
    }

    /* Leaflet overrides */
    .leaflet-control-attribution { display: none; }
    .leaflet-control-zoom { border: 1px solid rgba(245,240,232,0.1) !important; border-radius: 8px !important; overflow: hidden; }
    .leaflet-control-zoom a { background: rgba(14,14,14,0.9) !important; color: rgba(245,240,232,0.7) !important; border-color: rgba(245,240,232,0.1) !important; }
    .leaflet-control-zoom a:hover { background: rgba(40,40,40,0.95) !important; color: white !important; }

    .leaflet-popup-content-wrapper {
      background: #1a1a1a;
      border: 1px solid rgba(245,240,232,0.1);
      border-radius: 10px;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .leaflet-popup-tip { background: #1a1a1a; }
    .leaflet-popup-close-button { color: rgba(245,240,232,0.5) !important; }

    @media (max-width: 640px) {
      .hero { padding: 96px 24px 20px; }
      #map-container { margin: 16px; height: 55vh; }
      .stats-bar { padding: 16px 24px; gap: 20px; }
      .header-right { gap: 12px; }
      .team-filter { display: none; }
      .players-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); padding: 16px 20px 20px; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="https://www.womensprobaseballleague.com" target="_blank">
    <div class="logo-badge">WPBL</div>
    <div>
      <div class="logo-text">Women's Pro Baseball</div>
      <div class="logo-sub">Where the World Plays</div>
    </div>
  </a>
  <div class="header-right">
    <div class="team-filter">
      <button class="team-btn active" data-team="all">All Teams</button>
      <button class="team-btn" data-team="Boston">Boston</button>
      <button class="team-btn" data-team="Los Angeles">Los Angeles</button>
      <button class="team-btn" data-team="New York">New York</button>
      <button class="team-btn" data-team="San Francisco">San Francisco</button>
    </div>
    <div class="player-count" id="player-count">116 players</div>
  </div>
</header>

<section class="hero">
  <div class="hero-title">Where<br/>the world<br/><span>plays ball</span></div>
  <p class="hero-sub">Click any marker to explore players by hometown &nbsp;·&nbsp; Zoom &amp; pan to discover</p>
</section>

<div id="map-container">
  <div id="map"></div>
  <div class="map-legend">
    <div class="legend-title">Teams</div>
    <div class="legend-items">
      <div class="legend-item"><div class="legend-dot" style="background:var(--boston)"></div>Boston</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--la)"></div>Los Angeles</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--ny)"></div>New York</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--sf)"></div>San Francisco</div>
    </div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-num" id="stat-players">116</div>
    <div class="stat-label">Players</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="stat-countries">15</div>
    <div class="stat-label">Countries</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="stat-locations">89</div>
    <div class="stat-label">Hometowns</div>
  </div>
  <div class="stat-item">
    <div class="stat-num">4</div>
    <div class="stat-label">Teams</div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" role="dialog" aria-modal="true">
  <div id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-location" id="modal-location-name">Location</div>
        <div class="modal-location-sub" id="modal-location-sub">Players from this area</div>
      </div>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="players-grid" id="players-grid"></div>
  </div>
</div>

  'San Francisco': '#EF8200',
};

// Helper: generate player page slug
function playerSlug(name) {
  return name.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/['']/g, '')
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-');
}

function playerUrl(name) {
  return `https://www.womensprobaseballleague.com/players/${playerSlug(name)}/`;
}

// ── GROUP BY LOCATION ─────────────────────────────────────────────────────────
function buildLocationsMap(players) {
  const map = new Map();
  players.forEach(p => {
    const key = p.coords.join(',');
    if (!map.has(key)) {
      map.set(key, { location: p.location, coords: p.coords, players: [] });
    }
    map.get(key).players.push(p);
  });
  return map;
}

// ── PIN COLOR (multi-team = gold) ─────────────────────────────────────────────
function pinColor(players) {
  const teams = [...new Set(players.map(p => p.team))];
  if (teams.length > 1) return '#F2A900';
  return TEAM_COLORS[teams[0]] || '#888';
}

// ── CREATE MAP ────────────────────────────────────────────────────────────────
const leafMap = L.map('map', {
  center: [20, 10],
  zoom: 2,
  minZoom: 2,
  maxZoom: 10,
  zoomControl: true,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(leafMap);

let allMarkers = [];
let currentFilter = 'all';

function renderMarkers(filter) {
  // Remove old markers
  allMarkers.forEach(m => leafMap.removeLayer(m));
  allMarkers = [];

  const filteredPlayers = filter === 'all' ? PLAYERS : PLAYERS.filter(p => p.team === filter);
  const locMap = buildLocationsMap(filteredPlayers);

  // Stats
  const countries = new Set();
  filteredPlayers.forEach(p => {
    const parts = p.location.split(', ');
    countries.add(parts[parts.length - 1]);
  });
  document.getElementById('stat-players').textContent = filteredPlayers.length;
  document.getElementById('stat-countries').textContent = countries.size;
  document.getElementById('stat-locations').textContent = locMap.size;
  document.getElementById('player-count').textContent = `${filteredPlayers.length} players`;

  locMap.forEach((data, key) => {
    const count = data.players.length;
    const color = pinColor(data.players);
    const sizeClass = count === 1 ? 'size-1' : count <= 2 ? 'size-2' : count <= 4 ? 'size-3' : 'size-4';

    const iconHtml = `<div class="pin-cluster"><div class="pin-inner ${sizeClass}" style="background:${color}">${count > 1 ? count : ''}</div></div>`;

    const icon = L.divIcon({
      html: iconHtml,
      className: '',
      iconSize: [48, 48],
      iconAnchor: [24, 24],
    });

    const marker = L.marker(data.coords, { icon })
      .addTo(leafMap)
      .on('click', () => openModal(data));

    allMarkers.push(marker);
  });
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(data) {
  document.getElementById('modal-location-name').textContent = data.location;
  document.getElementById('modal-location-sub').textContent =
    `${data.players.length} player${data.players.length !== 1 ? 's' : ''} from this area`;

  const grid = document.getElementById('players-grid');
  grid.innerHTML = '';

  data.players.forEach(p => {
    const card = document.createElement('a');
    card.className = 'player-card';
    card.href = playerUrl(p.name);
    card.target = '_blank';
    card.rel = 'noopener noreferrer';

    const teamColor = TEAM_COLORS[p.team];

    card.innerHTML = `
      <img class="player-photo" src="${p.photo}" alt="${p.name}" loading="lazy"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div class="player-photo-placeholder" style="display:none">${p.name[0]}</div>
      <div class="player-info">
        <div class="player-name">${p.name}</div>
        <div class="player-meta">
          <div class="player-team-dot" style="background:${teamColor}"></div>
          <span class="player-team-name">${p.team}</span>
        </div>
        ${p.pos ? `<div class="player-pos">${p.pos}</div>` : ''}
      </div>
    `;
    grid.appendChild(card);
  });

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

// ── TEAM FILTER BUTTONS ───────────────────────────────────────────────────────
document.querySelectorAll('.team-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.team-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.team;
    renderMarkers(currentFilter);
  });
});

// ── INIT ──────────────────────────────────────────────────────────────────────
renderMarkers('all');
</script>
